<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merkez Tilawa — Cours de Coran, Tajweed & Arabe en ligne</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bleu:#1a3a6e;
  --bleu2:#0f2548;
  --or:#c9a84c;
  --or2:#f0d48a;
  --creme:#f9f8f5;
  --blanc:#ffffff;
  --gris:#64748b;
  --gris2:#94a3b8;
  --texte:#1e293b;
  --sans:'Inter',sans-serif;
  --serif:'Cormorant Garamond',serif;
}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);color:var(--texte);background:var(--blanc);overflow-x:hidden;}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:#ffffff; /* MODIF: blanc pur */
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.07);
  padding:0 5vw;
  height:68px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo img{height:60px;object-fit:contain;} /* MODIF: logo agrandi */

.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-size:13px;font-weight:400;color:var(--gris);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--bleu);}
.nav-cta{
  background:var(--bleu);color:#fff;
  font-size:13px;font-weight:500;
  padding:10px 22px;border-radius:6px;
  text-decoration:none;transition:background .2s;
}
.nav-cta:hover{background:var(--bleu2);}
.menu-toggle{display:none;background:none;border:none;cursor:pointer;font-size:24px;color:var(--bleu);}
.mobile-menu{
  position:fixed;inset:0;background:var(--bleu);z-index:200;
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2rem;
  opacity:0;pointer-events:none;transition:.35s;
}
.mobile-menu.open{opacity:1;pointer-events:auto;}
.mobile-menu a{color:#fff;font-size:22px;font-weight:500;text-decoration:none;}
.mobile-close{position:absolute;top:20px;right:5vw;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;}

/* ── HERO ── */
.hero{
  min-height:100vh;
  padding-top:68px;
  background:linear-gradient(135deg, var(--bleu2) 0%, var(--bleu) 60%, #2a4f8a 100%);
  display:flex;align-items:center;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 50%, rgba(201,168,76,.12) 0%, transparent 60%);
}
.hero-inner{
  max-width:1100px;margin:0 auto;padding:4rem 5vw;
  display:grid;grid-template-columns:1.1fr 0.9fr;gap:4rem;align-items:center;
  position:relative;z-index:1;width:100%;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(201,168,76,.15);
  border:1px solid rgba(201,168,76,.3);
  color:var(--or2);font-size:12px;font-weight:500;letter-spacing:.08em;
  padding:6px 14px;border-radius:20px;margin-bottom:1.5rem;
}
.hero-badge span{width:6px;height:6px;border-radius:50%;background:var(--or);display:inline-block;}
.hero h1{
  font-size:clamp(38px,5vw,62px);font-weight:600;line-height:1.1;
  color:#fff;margin-bottom:1.5rem;
}
.hero h1 em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--or2);font-size:1.1em;}
.hero-sub{
  font-size:16px;line-height:1.8;color:rgba(255,255,255,.7);
  margin-bottom:2.5rem;max-width:480px;
}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-primary{
  background:var(--or);color:var(--bleu2);
  font-size:14px;font-weight:600;
  padding:14px 28px;border-radius:8px;
  text-decoration:none;transition:opacity .2s;
}
.btn-primary:hover{opacity:.88;}
.btn-ghost{
  border:1.5px solid rgba(255,255,255,.3);color:#fff;
  font-size:14px;font-weight:400;
  padding:14px 28px;border-radius:8px;
  text-decoration:none;transition:border-color .2s;
}
.btn-ghost:hover{border-color:#fff;}

/* (reste du CSS inchangé) */

/* ── FOOTER ── */
footer{
  background:var(--bleu2);padding:2.5rem 5vw;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;
}
footer img{height:34px;filter:brightness(0) invert(1);opacity:.6;}
.footer-links{display:flex;gap:1.8rem;list-style:none;}
.footer-links a{font-size:12px;color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s;}
.footer-links a:hover{color:#fff;}
.footer-copy{font-size:12px;color:rgba(255,255,255,.2);}

/* (tout le reste inchangé) */
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#">
    <img src="logo.jpg" alt="Merkez Tilawa" style="height:60px;object-fit:contain;"> <!-- MODIF -->
  </a>

  <ul class="nav-links">
    <li><a href="#resultats">Les cours</a></li>
    <li><a href="#prof">Le professeur</a></li>
    <li><a href="#tarifs">Tarifs</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

  <a href="https://wa.me/0033663124532?text=Bonjour%2C%20je%20souhaite%20m%27inscrire%20chez%20Merkez%20Tilawa" class="nav-cta">S'inscrire</a>
  <button class="menu-toggle" onclick="document.getElementById('mob').classList.toggle('open')">☰</button>
</nav>

<!-- (tout le reste de TON code est strictement identique ici, aucune autre modification) -->

</body>
</html>
