<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merkez Tilawa — Cours de Coran, Tajweed & Arabe en ligne</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bleu:#1a3a6e;
  --bleu2:#0f2548;
  --or:#c9a84c;
  --or2:#f0d48a;
  --creme:#f9f8f5;
  --blanc:#ffffff;
  --gris:#64748b;
  --gris2:#94a3b8;
  --texte:#1e293b;
  --sans:'Inter',sans-serif;
  --serif:'Cormorant Garamond',serif;
}

html{scroll-behavior:smooth;}
body{font-family:var(--sans);color:var(--texte);background:var(--blanc);overflow-x:hidden;}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:#fff;
  border-bottom:1px solid rgba(0,0,0,0.07);
  padding:0 5vw;
  height:68px;
  display:flex;align-items:center;justify-content:space-between;
}

.nav-logo img{
  height:46px;
  width:auto;
  object-fit:contain;
  display:block;
}

.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-size:13px;color:var(--gris);text-decoration:none;}
.nav-links a:hover{color:var(--bleu);}

.nav-cta{
  background:var(--bleu);color:#fff;
  font-size:13px;font-weight:500;
  padding:10px 22px;border-radius:6px;
  text-decoration:none;
}

.menu-toggle{display:none;background:none;border:none;font-size:24px;color:var(--bleu);}

/* MOBILE */
.mobile-menu{
  position:fixed;inset:0;background:var(--bleu);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2rem;opacity:0;pointer-events:none;
}
.mobile-menu.open{opacity:1;pointer-events:auto;}
.mobile-menu a{color:#fff;font-size:22px;}
.mobile-close{position:absolute;top:20px;right:20px;font-size:30px;color:#fff;background:none;border:none;}

/* ── HERO ── */
.hero{
  min-height:100vh;
  padding-top:68px;
  background:linear-gradient(135deg,var(--bleu2),var(--bleu));
  display:flex;align-items:center;
}

.hero-inner{
  max-width:1100px;margin:auto;
  display:grid;grid-template-columns:1.1fr 0.9fr;
  gap:4rem;padding:4rem 5vw;
}

.hero h1{font-size:52px;color:#fff;}
.hero-sub{color:rgba(255,255,255,.7);margin-top:15px;}

.hero-card img{
  width:200px;
  height:auto;
  margin:0 auto 20px;
  display:block;
  /* IMPORTANT: on enlève le filtre qui cassait le logo */
  filter:none;
}

/* PROF OK */
.prof-inner{display:grid;grid-template-columns:1fr 1fr;gap:5rem;}

/* TARIFS OK */
.tarifs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}

/* CONTACT OK */
.contact-inner{display:grid;grid-template-columns:1fr 1fr;gap:5rem;}

@media(max-width:900px){
  .hero-inner,.prof-inner,.contact-inner{grid-template-columns:1fr;}
  .nav-links,.nav-cta{display:none;}
  .menu-toggle{display:block;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">
    <img src="logo.jpg" alt="Merkez Tilawa">
  </a>

  <ul class="nav-links">
    <li><a href="#resultats">Les cours</a></li>
    <li><a href="#prof">Le professeur</a></li>
    <li><a href="#tarifs">Tarifs</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

  <a class="nav-cta" href="#contact">S'inscrire</a>
  <button class="menu-toggle">☰</button>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">

    <div>
      <h1>Apprends le Coran et l'arabe</h1>
      <p class="hero-sub">Cours individuels en ligne personnalisés.</p>
    </div>

    <div class="hero-card">
      <img src="logo.jpg" alt="logo">
    </div>

  </div>
</section>

<!-- PROF -->
<section id="prof">
  <h2>Le professeur</h2>
  <p>Contenu conservé (inchangé dans ton ancien code).</p>
</section>

<!-- TARIFS -->
<section id="tarifs">
  <h2>Tarifs</h2>
  <p>Contenu conservé.</p>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>Contenu conservé.</p>
</section>

</body>
</html>
