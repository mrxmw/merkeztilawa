<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merkez Tilawa — Cours de Coran, Tajweed & Arabe en ligne</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bleu:#1a3a6e;
  --bleu2:#0f2548;
  --or:#c9a84c;
  --or2:#f0d48a;
  --creme:#f9f8f5;
  --blanc:#ffffff;
  --gris:#64748b;
  --texte:#1e293b;
  --sans:'Inter',sans-serif;
  --serif:'Cormorant Garamond',serif;
}

html{scroll-behavior:smooth;}

body{
  font-family:var(--sans);
  color:var(--texte);
  background:var(--blanc);
  overflow-x:hidden;
}

/* ── NAV ── */
nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  background:rgba(26,58,110,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  padding:0 5vw;
  height:68px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

nav img{
  height:44px;
  object-fit:contain;
}

/* MENU BLANC */
.nav-links{
  display:flex;
  gap:2rem;
  list-style:none;
}

.nav-links a{
  font-size:13px;
  font-weight:400;
  color:#ffffff;
  text-decoration:none;
  transition:color .2s;
}

.nav-links a:hover{
  color:var(--or);
}

.nav-cta{
  background:var(--or);
  color:var(--bleu2);
  font-size:13px;
  font-weight:500;
  padding:10px 22px;
  border-radius:6px;
  text-decoration:none;
  transition:opacity .2s;
}

.nav-cta:hover{
  opacity:.85;
}

.menu-toggle{
  display:none;
  background:none;
  border:none;
  color:#fff;
  font-size:24px;
  cursor:pointer;
}

/* MOBILE MENU */
.mobile-menu{
  position:fixed;
  inset:0;
  background:var(--bleu);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:2rem;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:200;
}

.mobile-menu.open{
  opacity:1;
  pointer-events:auto;
}

.mobile-menu a{
  color:#fff;
  font-size:22px;
  text-decoration:none;
}

.mobile-close{
  position:absolute;
  top:20px;
  right:5vw;
  background:none;
  border:none;
  color:#fff;
  font-size:28px;
}

/* HERO */
.hero{
  min-height:100vh;
  padding-top:68px;
  background:linear-gradient(135deg,var(--bleu2),var(--bleu));
  display:flex;
  align-items:center;
}

.hero-inner{
  width:100%;
  padding:4rem 5vw;
}

.hero h1{
  font-size:clamp(38px,5vw,62px);
  color:#fff;
  line-height:1.1;
  margin-bottom:1rem;
}

.hero-sub{
  color:rgba(255,255,255,.7);
  max-width:500px;
}

/* SECTION */
.section{
  padding:6rem 5vw;
}

.section-inner{
  max-width:1100px;
  margin:0 auto;
}

/* FOOTER */
footer{
  background:var(--bleu2);
  padding:2rem 5vw;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:1rem;
}

footer img{
  height:34px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .nav-links,
  .nav-cta{
    display:none;
  }
  .menu-toggle{
    display:block;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <img src="logo.png" alt="Merkez Tilawa">

  <ul class="nav-links">
    <li><a href="#resultats">Les cours</a></li>
    <li><a href="#prof">Le professeur</a></li>
    <li><a href="#tarifs">Tarifs</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

  <a class="nav-cta" href="https://wa.me/0033663124532">S'inscrire</a>

  <button class="menu-toggle" onclick="document.getElementById('mob').classList.toggle('open')">☰</button>
</nav>

<!-- MOBILE -->
<div class="mobile-menu" id="mob">
  <button class="mobile-close" onclick="document.getElementById('mob').classList.remove('open')">✕</button>
  <a href="#resultats">Les cours</a>
  <a href="#prof">Le professeur</a>
  <a href="#tarifs">Tarifs</a>
  <a href="#contact">Contact</a>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <h1>Apprends le Coran<br>et l'arabe</h1>
    <p class="hero-sub">Cours individuels en ligne sur Zoom</p>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <img src="logo.png" alt="Merkez Tilawa">

  <div style="color:#fff;opacity:.5;font-size:12px;">
    © 2026 Merkez Tilawa
  </div>
</footer>

</body>
</html>
